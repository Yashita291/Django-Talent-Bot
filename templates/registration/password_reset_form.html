{% extends "base.html" %}
{% block content %}
<div class="panel" style="max-width:360px; margin:40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2 style="margin-top:0;">Reset Password</h2>
  <p class="muted" style="font-size: 14px;">Enter your email address, and we'll send you a link to reset your password.</p>

  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom: 12px; display: flex; flex-direction: column;">
      <label style="margin-bottom: 4px; font-weight: bold;">Email Address</label>
      <input type="email" name="email" autocomplete="email" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;" placeholder="recruiter@company.com">
    </div>
    <div style="margin-top:16px;">
      <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Send Reset Link</button>
    </div>
  </form>
</div>
{% endblock %}
