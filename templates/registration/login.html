{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="panel" style="max-width:360px; margin:40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2 style="margin-top:0;">Sign in</h2>
  
  {% if form.errors or form.non_field_errors %}
    <div style="background-color: #fff3cd; color: #856404; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px;">
      <strong>Invalid username or password.</strong> Please try again.
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    
    <div style="margin-bottom: 12px; display: flex; flex-direction: column;">
      <label style="margin-bottom: 4px; font-weight: bold;">Username</label>
      <input type="text" name="username" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required placeholder="Enter your username">
    </div>
    
    <div style="margin-bottom: 4px; display: flex; flex-direction: column;">
      <label style="margin-bottom: 4px; font-weight: bold;">Password</label>
      <input type="password" name="password" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;" required placeholder="Enter your password">
    </div>

    <!-- Added Forgot Password Link right here -->
    <div style="margin-bottom: 16px; text-align: right;">
      <a href="{% url 'password_reset' %}" style="color: #007bff; text-decoration: none; font-size: 13px; font-weight: bold;">Forgot Password?</a>
    </div>

    <div style="margin-top:16px;">
      <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Sign in</button>
    </div>
  </form>
  
  <div style="margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 15px;">
    <p style="margin: 0; font-size: 14px; color: #666;">
      Don't have an account? <a href="{% url 'register' %}" style="color: #007bff; text-decoration: none; font-weight: bold;">Sign Up Here</a>
    </p>
  </div>
</div>
{% endblock %}
