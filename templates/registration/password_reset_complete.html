{% extends "base.html" %}
{% block content %}
<div class="panel" style="max-width:360px; margin:40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; text-align: center;">
  <h2 style="margin-top:0; color: #28a745;">Password Reset Complete</h2>
  <p class="muted" style="font-size: 14px; margin-bottom: 20px;">
    Your new password has been set successfully! You can now sign in to your recruiter workspace.
  </p>
  <a href="{% url 'login' %}" style="display: block; padding: 10px; background-color: #007bff; color: white; border-radius: 4px; text-decoration: none; font-weight: bold;">Sign In Here</a>
</div>
{% endblock %}
